name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff

      - name: Validate JSON batch files
        shell: bash
        run: |
          set -euo pipefail
          for file in batches/*.json; do
            python -m json.tool "$file" > /dev/null
          done

      - name: Lint Python with Ruff
        run: ruff check tools

      - name: Run tests (if present)
        shell: bash
        run: |
          set -euo pipefail
          if find . -type f \( -name 'test_*.py' -o -name '*_test.py' \) -not -path './.git/*' | grep -q .; then
            python -m pytest
          else
            echo "No test files detected; skipping pytest."
          fi

      - name: Build validation (Python compile check)
        run: python -m compileall -q tools
