name: CI

on:
  push:
  pull_request:

jobs:
  validate-skillmd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate SKILL.md schema
        run: python3 tools/validate_skillmd.py
